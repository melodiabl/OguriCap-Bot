name: CI

on:
  push:
    branches: [main, post-test]
  pull_request:
    branches: [main]

jobs:
  bot:
    name: Bot (lint + syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Check for syntax errors
        run: node --input-type=module < /dev/null || true
      - name: Validate entry point
        run: node --check index.js 2>&1 | head -20 || true

  panel:
    name: Panel (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://melodiaauris.qzz.io
          NEXT_PUBLIC_SOCKET_URL: https://melodiaauris.qzz.io
